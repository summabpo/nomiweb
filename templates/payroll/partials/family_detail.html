{% load crispy_forms_tags %}

<!-- Bootstrap-styled modal -->
<div class="modal-content1"  id="modal-content1">
    <div class="modal-header">
        <h3 class="modal-title">Detalle de Concepto</h3>
        <!--begin::Close-->
        <div class="btn btn-icon btn-sm btn-active-light-primary ms-2" up-dismiss aria-label="Close">
            <i class="ki-duotone ki-cross fs-1"><span class="path1"></span><span class="path2"></span></i>
        </div>
        <!--end::Close-->
    </div>   
    <div class="separator my-5"></div> 
    <!--begin::Input group-->        
    <div class="modal-body">
        <div class="container">

            <table class="table table-bordered table-striped">
                <tbody>
                    <tr>
                        <th>Nombre :</th>
                        <td>{{ data.name }}</td>
                    </tr>
                    <tr>
                        <th>Descripción :</th>
                        <td>{{ data.descrip }}</td>
                    </tr>

                    <tr>
                        <th>Conceptos</th>
                        <td>
                            {% if data.concepts %}
                                <ul>
                                    {% for concepto in data.concepts %}
                                        <li>{{ concepto.nombreconcepto }}</li>
                                    {% endfor %}
                                </ul>
                            {% else %}
                                —
                            {% endif %}
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>
    <div class="separator my-5"></div>
    <button type="button" class="btn btn-light-danger" up-dismiss>Close</button>
</div>
