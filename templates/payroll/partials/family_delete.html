{% load crispy_forms_tags %}

<!-- Modal de eliminación con formulario POST -->
<div class="modal-content3" id="modal-content3">
    <form id="form_family_delete" method="post" action="{% url 'payroll:family_delete' id=family.id %}">
        {% csrf_token %}
        <div class="modal-header">
            <h3 class="modal-title text-danger">Eliminar Familia</h3>
            <!--begin::Close-->
            <div class="btn btn-icon btn-sm btn-active-light-primary ms-2" up-dismiss aria-label="Close">
                <i class="ki-duotone ki-cross fs-1">
                    <span class="path1"></span><span class="path2"></span>
                </i>
            </div>
            <!--end::Close-->
        </div>   
        <div class="separator my-5"></div> 
        <div class="modal-body">
            <div class="container text-center">
                <p class="fs-5">¿Estás seguro que deseas eliminar esta familia?</p>
                <p class="text-muted">Esta acción no se puede deshacer.</p>
            </div>
        </div>
        <div class="separator my-5"></div>
        <div class="modal-footer btn-group justify-content-center">
            <button type="button" class="btn btn-light" up-dismiss>Cancelar</button>
            <div style="width: 10px;"></div>
            <button type="submit" class="btn btn-danger">Eliminar</button>
        </div>
    </form>
</div>
