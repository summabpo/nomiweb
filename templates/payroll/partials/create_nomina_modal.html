<div class="modal-content">
    <div class="modal-header">
        <h3 class="modal-title">Crear Nómina</h3>
        <button type="button" class="btn btn-icon btn-sm btn-active-light-primary ms-2" up-dismiss aria-label="Cerrar">
            <i class="ki-duotone ki-cross fs-1"><span class="path1"></span><span class="path2"></span></i>
        </button>
    </div>

    <div class="separator my-5"></div>

    <div class="modal-body">
        <form method="POST"
              up-submit
              up-target=".modal-content"
              up-layer="current"
              up-mode="replace">
            {% csrf_token %}
            {% load crispy_forms_tags %}
            {% crispy form %}
        </form>
    </div>

    <div class="separator my-5"></div>

    <div class="modal-footer">
        <button type="button" class="btn btn-light" up-dismiss>Cancelar</button>
        <button type="submit" form="form_payroll" class="btn btn-light-info">Crear</button>
    </div>
</div>
