{% load crispy_forms_tags %}

<!-- Bootstrap-styled modal -->
<div class="modal-content" id="modal-content">
    <!-- Header -->
    <div class="modal-header">
        <h3 class="modal-title">Carga masiva de solicitudes de vacaciones</h3>
        <!--begin::Close-->
        <div class="btn btn-icon btn-sm btn-active-light-primary ms-2" up-dismiss aria-label="Cerrar">
            <i class="ki-duotone ki-cross fs-1"><span class="path1"></span><span class="path2"></span></i>
        </div>
        <!--end::Close-->
    </div>

    <div class="separator my-5"></div>

    <!-- Body -->
    <div class="modal-body">
        <div class="container">
            <form id="upload-form" name="upload-form" method="POST" action="" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="file-upload" class="form-label fw-bold">Selecciona el archivo CSV</label>
                    <input class="form-control form-control-sm" id="file-upload" name="file" type="file" accept=".csv" />
                    <small id="fileHelp" class="form-text text-muted">
                        Solo se aceptan archivos en formato <strong>CSV (.csv)</strong>. <br>
                        <a href="" download>Haz clic aquí para descargar la plantilla CSV</a>.
                    </small>
                </div>
                <input type="hidden" id="hidden-field" name="hidden_field" value="valor_secreto" />
            </form>
        </div>
    </div>

    <div class="separator my-5"></div>

    <!-- Footer -->
    <div class="modal-footer btn-group">
        <button type="button" class="btn btn-light-danger" up-dismiss>Cancelar</button>
        <div style="width: 10px;"></div>
        <button type="submit" form="upload-form" class="btn btn-primary">Cargar archivo</button>
    </div>
</div>
